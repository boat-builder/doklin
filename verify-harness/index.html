<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HtmlView verification harness</title>
    <style>
      body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
      #controls { padding: 8px; display: flex; gap: 8px; border-bottom: 1px solid #ddd; }
      #stage {
        position: relative;
        width: 1100px;
        height: 660px;
        border: 1px solid #ccc;
        margin: 8px;
      }
      #sidecar-dump { font: 11px monospace; white-space: pre-wrap; padding: 8px; }
    </style>
  </head>
  <body>
    <script>
      // Minimal Tauri IPC stub: the only invoke HtmlView makes is
      // open_external (external links routed to the system browser).
      window.__opened = [];
      window.__TAURI_INTERNALS__ = {
        invoke: (cmd, args) => {
          if (cmd === "open_external") window.__opened.push(args.url);
          return Promise.resolve(null);
        },
        transformCallback: (cb) => cb,
        metadata: {},
      };
    </script>
    <div id="controls">
      <button id="toggle-visible">toggle comments</button>
      <button id="regen-keep">regenerate (text kept)</button>
      <button id="regen-drop">regenerate (anchor removed)</button>
    </div>
    <div id="stage"></div>
    <div id="sidecar-dump"></div>
    <script type="module" src="./harness.tsx"></script>
  </body>
</html>
